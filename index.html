  return           {bg:"#ffebee",text:"#c62828"};

const prevWeek = sem => {
  const idx=WEEKS.indexOf(sem); if(idx>0) return WEEKS[idx-1];
  const m=sem.match(/^S(\d+)$/); return m?`S${parseInt(m[1])-1}`:null;
};
const nextWeek = sem => {
  const idx=WEEKS.indexOf(sem); if(idx>=0&&idx<WEEKS.length-1) return WEEKS[idx+1];
  const m=sem.match(/^S(\d+)$/); return m?`S${parseInt(m[1])+1}`:null;
};
const getCoeffCruPure = (params, protName, etatName) => {
  const pp=params.proteines.find(p=>p.name===protName); if(!pp) return 1;
  const e=pp.etats.find(e=>e.name===etatName); return e?e.coeff_cru:1;
};
const calcEquivCru = (poids_brut, tare, coeff_cru) =>
  Math.max(0,(poids_brut||0)-(tare||0))*coeff_cru;
const calcTotalFromLines = (lines, protName, params) =>
  (lines||[]).reduce((s,l)=>s+calcEquivCru(l.poids_brut,l.tare,getCoeffCruPure(params,protName,l.etat)),0);

// ── NUM INPUT (module level — stable reference, no focus loss) ───────────────
function NumInput({value, onChange, placeholder="0"}) {
  const [local, setLocal] = useState(String(value??""));
  useEffect(()=>{ setLocal(String(value??"")); }, [value]);
  return (
    <input
      type="number"
      inputMode="decimal"
      value={local}
      placeholder={placeholder}
      onChange={e=>{ setLocal(e.target.value); onChange(e.target.value); }}
      style={{width:"100%",padding:"12px",border:"1px solid #ddd",borderRadius:8,fontSize:18,textAlign:"center",background:"#fffde7",boxSizing:"border-box"}}
    />
  );
}

              {readOnly
                ?<span style={{fontSize:11,color:"#555",fontWeight:500}}>{l.etat||"—"}</span>
                :<select value={l.etat} onChange={e=>onUpdate(idx,"etat",e.target.value)}
                    style={{padding:"4px 5px",borderRadius:4,border:"1px solid #ddd",fontSize:11,background:"#fffde7"}}>
                    <option value="">— État —</option>
                    {pp.etats.map(e=><option key={e.name}>{e.name}</option>)}
                  </select>
              }
              {readOnly
                ?<div style={{textAlign:"center",fontSize:11,color:"#555"}}>{fmtN(l.poids_brut,3)}</div>
                :<NumInput value={l.poids_brut} onChange={v=>onUpdate(idx,"poids_brut",v)}/>
              }
              {readOnly
                ?<div style={{textAlign:"center",fontSize:11,color:"#555"}}>{fmtN(l.tare,3)}</div>
                :<NumInput value={l.tare} onChange={v=>onUpdate(idx,"tare",v)}/>
              }
              <div style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#555"}}>{fmtN(net,3)}</div>
              <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:isValidatedBlock?"#2e7d32":colorAccent}}>{fmtN(equiv,3)}</div>
              {readOnly?<div/>:<button onClick={()=>onDel(idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:13,padding:0}}>✕</button>}
            </div>
          );
        })}
        {!readOnly&&<button onClick={onAdd} style={{fontSize:11,padding:"4px 12px",background:"#e8eaf6",color:colorAccent,border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,marginTop:4}}>+ Ajouter ligne</button>}
      </div>
      {lines.length>0&&(
        <div style={{padding:"7px 14px",background:"rgba(0,0,0,0.04)",display:"flex",justifyContent:"flex-end",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#666"}}>Total équiv. cru net</span>
          <span style={{fontSize:14,fontWeight:700,color:isValidatedBlock?"#2e7d32":colorAccent}}>{fmtN(total_equiv,3)} kg</span>
        </div>
      )}
    </div>
  );
}

// ── SHARED UI (module level) ─────────────────────────────────────────────────
function SectionLabel({children}) {
  return <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>{children}</div>;
}
function WeekSelector({val,set}) {
  return(
    <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
      {WEEKS.map(w=>(
        <button key={w} onClick={()=>set(w)} style={{fontSize:11,padding:"3px 9px",borderRadius:14,border:"1px solid",borderColor:val===w?"#1a237e":"#e0e0e0",background:val===w?"#1a237e":"#fff",color:val===w?"#fff":"#555",cursor:"pointer",fontWeight:val===w?700:400}}>{w}</button>
      ))}
      <input value={val} onChange={e=>set(e.target.value)} placeholder="S00" style={{width:44,padding:"3px 6px",borderRadius:14,border:"1px solid #ddd",fontSize:11,textAlign:"center"}}/>
    </div>
  );
}
function RestSelector({val,set}) {
  return(
    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
      {RESTAURANTS.map(r=>(
        <button key={r} onClick={()=>set(r)} style={{fontSize:11,padding:"3px 10px",borderRadius:14,border:"1px solid",borderColor:val===r?"#1a237e":"#e0e0e0",background:val===r?"#1a237e":"#fff",color:val===r?"#fff":"#555",cursor:"pointer",fontWeight:val===r?700:400}}>{r}</button>
      ))}
    </div>
  );
}

// ── VALIDATE BUTTON ──────────────────────────────────────────────────────────
function ValBtn({isVal, onValidate, onUnvalidate}) {
  return isVal
    ? <><span style={{fontSize:11,background:"#e8f5e9",color:"#2e7d32",padding:"4px 10px",borderRadius:6,fontWeight:600}}>✓ Inventaire validé</span>
        <button onClick={onUnvalidate} style={{fontSize:10,padding:"3px 10px",background:"none",border:"1px solid #ddd",borderRadius:6,cursor:"pointer",color:"#888"}}>Modifier</button></>
    : <button onClick={onValidate} style={{fontSize:12,padding:"6px 16px",background:"#1a237e",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontWeight:700,boxShadow:"0 2px 6px rgba(26,35,126,.25)"}}>✓ Valider l'inventaire</button>;
}

// ════════════════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════════════════
function App() {
  const [achats,    setAchats]    = useState(INIT_ACHATS);
  const [params,    setParams]    = useState(DEFAULT_PARAMS);
  const [invData,   setInvData]   = useState({});
  const [ctrlData,  setCtrlData]  = useState({});
  const [transfers, setTransfers] = useState([]);
  const [validated, setValidated] = useState({});
  const [forceManual,setForceManual]=useState({});
  const [isLoaded,  setIsLoaded]  = useState(false);
  const [saved,     setSaved]     = useState(false);
  const [mode,      setMode]      = useState("achats");

  // Achats UI
  const [tab,        setTab]        = useState("Cercle Vert");
  const [achatsView, setAchatsView] = useState("ingredients");
  const [moisFilter, setMoisFilter] = useState("Tous");
  const [form,       setForm]       = useState({fournisseur:"Cercle Vert",restaurant:"Washington",mois:"Janvier 2026",ingredient:"",montant:"",qty:"",unit:""});
  // Contrôle UI
  const [ctrlSem,   setCtrlSem]  = useState("S13");
  const [ctrlRest,  setCtrlRest] = useState("Washington");
  const [ctrlView,  setCtrlView] = useState("detail");
  // Inventaire UI
  const [invSem,    setInvSem]   = useState("S13");
  const [invRest,   setInvRest]  = useState("Washington");
  // Transfert form (hoisted here so InventaireView stays hook-free)
  const [transForm, setTransForm] = useState({to:RESTAURANTS[1],prot:DEFAULT_PARAMS.proteines[0]?.name||"",etat:"",poids_brut:"",tare:"",note:""});
  const [showTrans, setShowTrans] = useState(false);
  const [newBac,    setNewBac]    = useState({name:"", tare:""});
  const [invMobileSection, setInvMobileSection] = useState("debut"); // debut | fin | transfert
  const [invMobileProtIdx, setInvMobileProtIdx] = useState(0);

  // ── Storage ──
  useEffect(()=>{
    (async()=>{
      const load=async(key,setter,fallback)=>{
        try{ const r=await window.storage.get(key); if(r&&r.value) setter(JSON.parse(r.value)); else if(fallback!==undefined) setter(fallback); }
        catch{ if(fallback!==undefined) setter(fallback); }
      };
      await Promise.all([
        load(SK.achats,setAchats,INIT_ACHATS),
        load(SK.params,setParams,DEFAULT_PARAMS),
        load(SK.inv,setInvData,{}),
        load(SK.ctrl,setCtrlData,{}),
        load(SK.trans,setTransfers,[]),
        load(SK.validated,setValidated,{}),
        load(SK.force,setForceManual,{}),
      ]);
      setIsLoaded(true);
    })();
  },[]);

  useEffect(()=>{
    if(!isLoaded) return;
    setCtrlData(prev => {
      const updated = {...prev};
      try {
        Object.entries(ZELTY_DATA).forEach(([resto, weeks]) => {
          Object.entries(weeks).forEach(([sem, prots]) => {
            const key = "ctrl__" + resto + "__" + sem;
            if (!updated[key]) updated[key] = {};
            Object.entries(prots).forEach(([prot, vals]) => {
              if (!updated[key][prot]) updated[key][prot] = {portions_sig:0,portions_opt:0,cmd_brut:0,inv_debut:0,inv_fin:0};
              updated[key][prot].portions_sig = vals.portions_sig;
              updated[key][prot].portions_opt = vals.portions_opt;
              // inv_fin si disponible
              if(vals.inv_fin !== undefined) updated[key][prot].inv_fin = vals.inv_fin;
            });
          });
        });
      } catch(e) {}
      return updated;
    });
  },[isLoaded]);

  const persist=useCallback(async(key,val)=>{
    try{ await window.storage.set(key,JSON.stringify(val)); setSaved(true); setTimeout(()=>setSaved(false),1500); }
    catch(e){ console.error("Storage error:",e); }
  },[]);

  const saveAchats   =d=>{ setAchats(d);    persist(SK.achats,d); };
  const saveParams   =d=>{ setParams(d);    persist(SK.params,d); };
  const saveInv      =d=>{ setInvData(d);   persist(SK.inv,d); };
  const saveCtrl     =d=>{ setCtrlData(d);  persist(SK.ctrl,d); };
  const saveTrans    =d=>{ setTransfers(d); persist(SK.trans,d); };
  const saveValidated=d=>{ setValidated(d); persist(SK.validated,d); };
  const saveForce    =d=>{ setForceManual(d);persist(SK.force,d); };

  // ── Inventory helpers ──
  const finKey    =(rest,sem)=>`invfin__${rest}__${sem}`;
  const debKey    =(rest,sem)=>`invdeb__${rest}__${sem}`;
  const valKeyDeb =(rest,sem)=>`deb__${rest}__${sem}`;
  const valKeyFin =(rest,sem)=>`fin__${rest}__${sem}`;

  const getLines=(sk,prot)=>(invData[sk]?.[prot]?.lines)||[];
  const setLines=(sk,prot,lines)=>saveInv({...invData,[sk]:{...(invData[sk]||{}),[prot]:{lines}}});
  const addLine2   =(sk,prot)=>setLines(sk,prot,[...getLines(sk,prot),{etat:"",poids_brut:0,tare:0}]);
  const delLine2   =(sk,prot,idx)=>{ const l=[...getLines(sk,prot)]; l.splice(idx,1); setLines(sk,prot,l); };
  const updateLine2=(sk,prot,idx,f,v)=>{
    const l=[...getLines(sk,prot)];
    if(!l[idx]) l[idx]={etat:"",poids_brut:0,tare:0};
    l[idx]={...l[idx],[f]:f==="etat"?v:(parseFloat(v)||0)};
    setLines(sk,prot,l);
  };

  const prevHasFin=(rest,sem)=>{ const prev=prevWeek(sem); if(!prev) return false; return params.proteines.some(pp=>getLines(finKey(rest,prev),pp.name).length>0); };
  const isManualDeb=(rest,sem)=>forceManual[`${rest}__${sem}`]||!prevHasFin(rest,sem);
  const getDebutLines=(rest,sem,prot)=>{ if(isManualDeb(rest,sem)) return getLines(debKey(rest,sem),prot); const prev=prevWeek(sem); return getLines(finKey(rest,prev||""),prot); };
  const getDebutTotal=(rest,sem,prot)=>calcTotalFromLines(getDebutLines(rest,sem,prot),prot,params);
  const getFinTotal  =(rest,sem,prot)=>calcTotalFromLines(getLines(finKey(rest,sem),prot),prot,params);

  const isValidated  =key=>!!validated[key];
  const validate     =key=>saveValidated({...validated,[key]:true});
  const unvalidate   =key=>{ const v={...validated}; delete v[key]; saveValidated(v); };

  // ── Transfers ──
  const addTransfer=(from,to,sem,prot,etat,poids_brut,tare,note)=>{
    const qty_net=calcEquivCru(parseFloat(poids_brut)||0,parseFloat(tare)||0,getCoeffCruPure(params,prot,etat));
    saveTrans([...transfers,{id:Date.now(),from,to,sem,prot,etat,poids_brut:parseFloat(poids_brut)||0,tare:parseFloat(tare)||0,qty_net,note:note||"",date:new Date().toLocaleDateString("fr-FR")}]);
  };
  const delTransfer=id=>saveTrans(transfers.filter(t=>t.id!==id));
  const getTransferNet=(rest,sem,prot)=>{
    const out=transfers.filter(t=>t.from===rest&&t.sem===sem&&t.prot===prot).reduce((s,t)=>s+t.qty_net,0);
    const inn=transfers.filter(t=>t.to===rest  &&t.sem===sem&&t.prot===prot).reduce((s,t)=>s+t.qty_net,0);
    return inn-out;
  };

  // ── Contrôle ──
  const getCtrlProt=(rest,sem,prot)=>(ctrlData[`ctrl__${rest}__${sem}`]?.[prot])||{portions_sig:0,portions_opt:0,cmd_brut:0};
  const updateCtrlProt=(rest,sem,prot,f,v)=>{ const k=`ctrl__${rest}__${sem}`; saveCtrl({...ctrlData,[k]:{...(ctrlData[k]||{}),[prot]:{...getCtrlProt(rest,sem,prot),[f]:parseFloat(v)||0}}}); };
  const calcCtrlProt=(rest,sem,pp)=>{
    const d=getCtrlProt(rest,sem,pp.name);
    const total_p=(d.portions_sig||0)+(d.portions_opt||0);
    const theo_net=(total_p*pp.grammage)/1000;
    const theo_brut=pp.coeff>0?theo_net/pp.coeff:0;
    const cmd_net=(d.cmd_brut||0)*pp.coeff;
    const inv_debut=getDebutTotal(rest,sem,pp.name);
    const inv_fin=getFinTotal(rest,sem,pp.name);
    const trans_net=getTransferNet(rest,sem,pp.name);
    const conso_reelle=inv_debut+cmd_net-inv_fin+trans_net;
    const ecart_kg=conso_reelle-theo_net;
    const ecart_pct=theo_net>0?(ecart_kg/theo_net)*100:0;
    return{total_p,theo_net,theo_brut,cmd_net,inv_debut,inv_fin,conso_reelle,ecart_kg,ecart_pct,trans_net};
  };

  // ── Achats ──
  const filteredEntries=f=>Object.entries(achats).filter(([k])=>{ const[ff,,m]=k.split("__"); return ff===f&&(moisFilter==="Tous"||m===moisFilter); });
  const rowsFor=f=>{
    const byI={},byR={};
    filteredEntries(f).forEach(([k,lines])=>{ const[,r]=k.split("__"); lines.forEach(l=>{ if(!byI[l.ingredient]) byI[l.ingredient]={montant:0,qty:0,unit:l.unit||""}; byI[l.ingredient].montant+=l.montant; byI[l.ingredient].qty+=(l.qty||0); byI[l.ingredient].unit=l.unit||byI[l.ingredient].unit; byR[r]=(byR[r]||0)+l.montant; }); });
    const total=Object.values(byI).reduce((a,b)=>a+b.montant,0);
    return{ings:Object.entries(byI).sort((a,b)=>b[1].montant-a[1].montant),rests:Object.entries(byR).sort((a,b)=>b[1]-a[1]),total};
  };
  const globalTotal=Object.entries(achats).filter(([k])=>moisFilter==="Tous"||k.split("__")[2]===moisFilter).reduce((s,[,a])=>s+a.reduce((x,l)=>x+l.montant,0),0);
  const addAchatLine=()=>{
    if(!form.ingredient.trim()||!form.montant) return;
    const k=`${form.fournisseur}__${form.restaurant}__${form.mois}`;
    saveAchats({...achats,[k]:[...(achats[k]||[]),{ingredient:form.ingredient.trim(),montant:parseFloat(form.montant),qty:form.qty?parseFloat(form.qty):0,unit:form.unit||""}]});
    setForm(f=>({...f,ingredient:"",montant:"",qty:"",unit:""}));
  };
  const delAchatLine=(k,i)=>{ const a=[...(achats[k]||[])]; a.splice(i,1); saveAchats({...achats,[k]:a}); };
  const c=COLORS[tab]||COLORS["Cercle Vert"];
  const {ings,rests,total}=rowsFor(tab);

  // ════════════════════════════════════════════════════════════════════════
  // INVENTAIRE VIEW (inline render — no component boundary, no focus loss)
  // ════════════════════════════════════════════════════════════════════════
  const renderInventaire=()=>{
    const prev=prevWeek(invSem);
    const next=nextWeek(invSem);
    const isManual=isManualDeb(invRest,invSem);
    const forceKey=`${invRest}__${invSem}`;
    const vkDeb=valKeyDeb(invRest,invSem);
    const vkFin=valKeyFin(invRest,invSem);
    const valDeb=isValidated(vkDeb);
    const valFin=isValidated(vkFin);

    // Mobile: quel type d'inventaire est actif (debut | fin | transfert)
    const [invSection, setInvSection_] = [invMobileSection, setInvMobileSection];
    // Mobile: index de la protéine active
    const [protIdx, setProtIdx_] = [invMobileProtIdx, setInvMobileProtIdx];
    const pp = params.proteines[protIdx] || params.proteines[0];
    const sk = invSection==="debut"
      ? (isManual ? debKey(invRest,invSem) : finKey(invRest,prevWeek(invSem)||""))
      : finKey(invRest,invSem);
    const lines = invSection==="debut" ? getDebutLines(invRest,invSem,pp.name) : getLines(sk,pp.name);
    const skEditable = invSection==="debut" ? (isManual ? debKey(invRest,invSem) : null) : finKey(invRest,invSem);
    const isReadOnly = invSection==="debut" ? (valDeb||!isManual) : valFin;
    const accent = invSection==="debut" ? (isManual?"#e65100":"#2e7d32") : "#1a237e";
    const totalEquiv = calcTotalFromLines(lines, pp.name, params);
    const vk = invSection==="debut" ? vkDeb : vkFin;
    const isVal = invSection==="debut" ? valDeb : valFin;

    return(
      <div style={{maxWidth:480,margin:"0 auto"}}>

        {/* ── Semaine + Restaurant ── */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Semaine</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {WEEKS.map(w=>(
              <button key={w} onClick={()=>setInvSem(w)} style={{flexShrink:0,fontSize:13,padding:"8px 14px",borderRadius:20,border:"1px solid",borderColor:invSem===w?"#1a237e":"#e0e0e0",background:invSem===w?"#1a237e":"#fff",color:invSem===w?"#fff":"#555",cursor:"pointer",fontWeight:invSem===w?700:400}}>{w}</button>
            ))}
            <input value={invSem} onChange={e=>setInvSem(e.target.value)} placeholder="S00" style={{flexShrink:0,width:52,padding:"8px 6px",borderRadius:20,border:"1px solid #ddd",fontSize:13,textAlign:"center"}}/>
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Restaurant</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {RESTAURANTS.map(r=>(
              <button key={r} onClick={()=>setInvRest(r)} style={{flexShrink:0,fontSize:13,padding:"8px 16px",borderRadius:20,border:"1px solid",borderColor:invRest===r?"#1a237e":"#e0e0e0",background:invRest===r?"#1a237e":"#fff",color:invRest===r?"#fff":"#555",cursor:"pointer",fontWeight:invRest===r?700:400}}>{r}</button>
            ))}
          </div>
        </div>

        {/* ── Section tabs ── */}
        <div style={{display:"flex",gap:4,marginBottom:16}}>
          {[["debut","Début"],["fin","Fin"],["transfert","Transferts"]].map(([v,l])=>(
            <button key={v} onClick={()=>setInvSection_(v)}
              style={{flex:1,padding:"10px 0",fontSize:13,fontWeight:invSection===v?700:400,
                background:invSection===v?"#1a237e":"#f0f0ee",color:invSection===v?"#fff":"#666",
                border:"none",borderRadius:10,cursor:"pointer",transition:"all .15s"}}>
              {l}
              {v==="debut"&&valDeb&&" ✓"}
              {v==="fin"&&valFin&&" ✓"}
            </button>
          ))}
        </div>

        {/* ── DEBUT / FIN section ── */}
        {invSection!=="transfert"&&(
          <div>
            {/* Status banner */}
            {invSection==="debut"&&(
              <div style={{marginBottom:12,padding:"10px 14px",borderRadius:10,background:isManual?"#fff3e0":"#e8f5e9",border:`1px solid ${isManual?"#ffe0b2":"#a5d6a7"}`,fontSize:12,color:isManual?"#e65100":"#2e7d32",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>{isManual?`⚠ Saisie manuelle requise`:`✓ Repris depuis fin ${prev}`}</span>
                {!isManual&&!valDeb&&<button onClick={()=>saveForce({...forceManual,[forceKey]:true})} style={{fontSize:11,padding:"3px 8px",background:"none",border:"1px solid currentColor",borderRadius:6,cursor:"pointer",color:"inherit"}}>Forcer</button>}
                {isManual&&forceManual[forceKey]&&!valDeb&&<button onClick={()=>{const f={...forceManual};delete f[forceKey];saveForce(f);}} style={{fontSize:11,padding:"3px 8px",background:"none",border:"1px solid currentColor",borderRadius:6,cursor:"pointer",color:"inherit"}}>Auto</button>}
              </div>
            )}
            {invSection==="fin"&&next&&(
              <div style={{marginBottom:12,padding:"10px 14px",borderRadius:10,background:"#e3f2fd",border:"1px solid #bbdefb",fontSize:12,color:"#1565c0"}}>
                ℹ Sera utilisé comme début de {next}
              </div>
            )}

            {/* Protein tabs */}
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {params.proteines.map((p,i)=>{
                const tot=calcTotalFromLines(
                  invSection==="debut" ? getDebutLines(invRest,invSem,p.name) : getLines(finKey(invRest,invSem),p.name),
                  p.name, params
                );
                return(
                  <button key={p.name} onClick={()=>setProtIdx_(i)}
                    style={{flexShrink:0,padding:"8px 14px",borderRadius:14,border:"1px solid",
                      borderColor:protIdx===i?accent:"#e0e0e0",
                      background:protIdx===i?accent:"#fff",
                      color:protIdx===i?"#fff":"#555",
                      cursor:"pointer",fontSize:13,fontWeight:protIdx===i?700:400}}>
                    {p.name}
                    {tot>0&&<span style={{marginLeft:5,fontSize:11,opacity:.85}}>{fmtN(tot,2)} kg</span>}
                  </button>
                );
              })}
            </div>

            {/* Protein card header */}
            <div style={{background:isVal?"#2e7d32":accent,borderRadius:"12px 12px 0 0",padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,fontSize:16,color:"#fff"}}>{pp.name}</span>
              <span style={{fontSize:13,color:"rgba(255,255,255,0.8)"}}>≡ <strong style={{color:"#fff"}}>{fmtN(totalEquiv,3)} kg</strong> cru net</span>
            </div>

            {/* Lines */}
            <div style={{background:"#fafaf8",border:"1px solid #eee",borderTop:"none",borderRadius:"0 0 12px 12px",padding:"12px",marginBottom:12}}>
              {lines.length===0&&<div style={{textAlign:"center",padding:"20px 0",color:"#bbb",fontSize:13}}>Aucune ligne — appuyez sur + pour ajouter</div>}
              {lines.map((l,idx)=>{
                const net=Math.max(0,(l.poids_brut||0)-(l.tare||0));
                const equiv=calcEquivCru(l.poids_brut,l.tare,getCoeffCruPure(params,pp.name,l.etat));
                return(
                  <div key={idx} style={{background:"#fff",borderRadius:10,border:"1px solid #eee",padding:"12px",marginBottom:8}}>
                    {/* État */}
                    {isReadOnly
                      ?<div style={{fontSize:13,fontWeight:600,color:"#333",marginBottom:8}}>{l.etat||"—"}</div>
                      :<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                        {pp.etats.map(e=>(
                          <button key={e.name} onClick={()=>skEditable&&updateLine2(skEditable,pp.name,idx,"etat",e.name)}
                            style={{padding:"7px 14px",borderRadius:20,border:"1px solid",fontSize:13,
                              borderColor:l.etat===e.name?accent:"#ddd",
                              background:l.etat===e.name?accent:"#fff",
                              color:l.etat===e.name?"#fff":"#555",cursor:"pointer",fontWeight:l.etat===e.name?600:400}}>
                            {e.name}
                          </button>
                        ))}
                      </div>
                    }
                    {/* Poids */}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
                      {[["Poids brut (kg)","poids_brut",l.poids_brut],["Tare (kg)","tare",l.tare]].map(([lbl,field,val])=>(
                        <div key={field}>
                          <div style={{fontSize:11,color:"#999",marginBottom:4}}>{lbl}</div>
                          {isReadOnly
                            ?<div style={{fontSize:16,fontWeight:600,color:"#333",padding:"10px 0"}}>{fmtN(val,3)}</div>
                            :<NumInput value={val} onChange={v=>skEditable&&updateLine2(skEditable,pp.name,idx,field,v)}/>
                          }
                        </div>
                      ))}
                    </div>
                    {/* Résultat */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#f5f5f5",borderRadius:8}}>
                      <span style={{fontSize:12,color:"#888"}}>Net : <strong style={{color:"#333"}}>{fmtN(net,3)} kg</strong></span>
                      <span style={{fontSize:13,fontWeight:700,color:isVal?"#2e7d32":accent}}>≡ {fmtN(equiv,3)} kg cru net</span>
                    </div>
                    {!isReadOnly&&(
                      <button onClick={()=>skEditable&&delLine2(skEditable,pp.name,idx)}
                        style={{width:"100%",marginTop:8,padding:"8px",background:"#ffebee",color:"#c62828",border:"none",borderRadius:8,fontSize:13,cursor:"pointer",fontWeight:600}}>
                        Supprimer cette ligne
                      </button>
                    )}
                  </div>
                );
              })}
              {!isReadOnly&&(
                <button onClick={()=>skEditable&&addLine2(skEditable,pp.name)}
                  style={{width:"100%",padding:"14px",background:"#e8eaf6",color:"#1a237e",border:"2px dashed #9fa8da",borderRadius:10,fontSize:14,cursor:"pointer",fontWeight:600,marginTop:4}}>
                  + Ajouter une ligne
                </button>
              )}
            </div>

            {/* Validation */}
            {isVal
              ?<div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#e8f5e9",borderRadius:12,border:"1px solid #a5d6a7"}}>
                <span style={{fontSize:14,fontWeight:700,color:"#2e7d32"}}>✓ Inventaire validé</span>
                <button onClick={()=>unvalidate(vk)} style={{padding:"8px 16px",background:"#fff",color:"#666",border:"1px solid #ddd",borderRadius:8,fontSize:13,cursor:"pointer"}}>Modifier</button>
              </div>
              :<button onClick={()=>{
                  const any=params.proteines.some(p=>{
                    const ls=invSection==="debut"?getDebutLines(invRest,invSem,p.name):getLines(finKey(invRest,invSem),p.name);
                    return ls.length>0;
                  });
                  if(!any){alert("Ajoutez au moins une ligne avant de valider.");return;}
                  validate(vk);
                }}
                style={{width:"100%",padding:"16px",background:"#1a237e",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(26,35,126,.3)"}}>
                ✓ Valider l'inventaire {invSection==="debut"?"début":"fin"}
              </button>
            }
          </div>
        )}

        {/* ── TRANSFERTS ── */}
        {invSection==="transfert"&&(
          <div>
            <button onClick={()=>setShowTrans(!showTrans)}
              style={{width:"100%",padding:"14px",background:showTrans?"#f5f5f5":"#fff3e0",color:"#e65100",border:"1px solid #ffe0b2",borderRadius:12,fontSize:14,cursor:"pointer",fontWeight:600,marginBottom:12}}>
              {showTrans?"Annuler":"+ Nouveau transfert"}
            </button>

            {showTrans&&(
              <div style={{background:"#fff8f0",border:"1px solid #ffe0b2",borderRadius:12,padding:16,marginBottom:16}}>
                {/* Vers */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Vers</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {RESTAURANTS.filter(r=>r!==invRest).map(r=>(
                      <button key={r} onClick={()=>setTransForm(f=>({...f,to:r}))}
                        style={{padding:"9px 16px",borderRadius:20,border:"1px solid",fontSize:13,borderColor:transForm.to===r?"#e65100":"#ddd",background:transForm.to===r?"#e65100":"#fff",color:transForm.to===r?"#fff":"#555",cursor:"pointer",fontWeight:transForm.to===r?600:400}}>
                        {r}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Protéine */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Protéine</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {params.proteines.map(p=>(
                      <button key={p.name} onClick={()=>setTransForm(f=>({...f,prot:p.name,etat:""}))}
                        style={{padding:"9px 16px",borderRadius:20,border:"1px solid",fontSize:13,borderColor:transForm.prot===p.name?"#e65100":"#ddd",background:transForm.prot===p.name?"#e65100":"#fff",color:transForm.prot===p.name?"#fff":"#555",cursor:"pointer",fontWeight:transForm.prot===p.name?600:400}}>
                        {p.name}
                      </button>
                    ))}
                  </div>
                </div>
                {/* État */}
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>État</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {(params.proteines.find(p=>p.name===transForm.prot)?.etats||[]).map(e=>(
                      <button key={e.name} onClick={()=>setTransForm(f=>({...f,etat:e.name}))}
                        style={{padding:"9px 16px",borderRadius:20,border:"1px solid",fontSize:13,borderColor:transForm.etat===e.name?"#e65100":"#ddd",background:transForm.etat===e.name?"#e65100":"#fff",color:transForm.etat===e.name?"#fff":"#555",cursor:"pointer",fontWeight:transForm.etat===e.name?600:400}}>
                        {e.name}
                      </button>
                    ))}
                  </div>
                </div>
                {/* Poids */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  {[["Poids brut (kg)","poids_brut"],["Tare (kg)","tare"]].map(([lbl,f])=>(
                    <div key={f}>
                      <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>{lbl}</div>
                      <input inputMode="decimal" value={transForm[f]} onChange={e=>setTransForm(tf=>({...tf,[f]:e.target.value}))}
                        placeholder="0.00" style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #ddd",fontSize:16,textAlign:"center",background:"#fffde7",boxSizing:"border-box"}}/>
                    </div>
                  ))}
                </div>
                {/* Note */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:"#888",marginBottom:6,fontWeight:600,textTransform:"uppercase"}}>Note (optionnel)</div>
                  <input value={transForm.note} onChange={e=>setTransForm(f=>({...f,note:e.target.value}))}
                    placeholder="Ex: surplus semaine" style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid #ddd",fontSize:14,boxSizing:"border-box"}}/>
                </div>
                {/* Aperçu */}
                {transForm.poids_brut&&transForm.etat&&(
                  <div style={{padding:"10px 14px",background:"#e8f5e9",borderRadius:8,marginBottom:12,fontSize:13,color:"#2e7d32",fontWeight:600,textAlign:"center"}}>
                    ≡ {fmtN(calcEquivCru(parseFloat(transForm.poids_brut)||0,parseFloat(transForm.tare)||0,getCoeffCruPure(params,transForm.prot,transForm.etat)),3)} kg cru net
                  </div>
                )}
                <button onClick={()=>{
                  if(!transForm.poids_brut||!transForm.etat) return;
                  addTransfer(invRest,transForm.to,invSem,transForm.prot,transForm.etat,transForm.poids_brut,transForm.tare,transForm.note);
                  setTransForm(f=>({...f,etat:"",poids_brut:"",tare:"",note:""}));
                  setShowTrans(false);
                }} style={{width:"100%",padding:"16px",background:"#e65100",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                  Valider le transfert
                </button>
              </div>
            )}

            {transfers.filter(t=>(t.from===invRest||t.to===invRest)&&t.sem===invSem).length===0
              ?<div style={{textAlign:"center",padding:"24px 0",color:"#bbb",fontSize:13}}>Aucun transfert cette semaine</div>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {transfers.filter(t=>(t.from===invRest||t.to===invRest)&&t.sem===invSem).map(t=>{
                  const isOut=t.from===invRest;
                  return(
                    <div key={t.id} style={{background:isOut?"#ffebee":"#e8f5e9",borderRadius:10,padding:"12px 14px",fontSize:13}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontWeight:700,color:isOut?"#c62828":"#2e7d32"}}>{isOut?"↗ Sortie":"↙ Entrée"} — {t.prot}</span>
                        <button onClick={()=>delTransfer(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:16,padding:"0 4px"}}>✕</button>
                      </div>
                      <div style={{color:"#555",marginBottom:2}}><span style={{background:"rgba(0,0,0,0.08)",padding:"2px 7px",borderRadius:4,fontSize:12}}>{t.etat}</span> {isOut?`→ ${t.to}`:`← ${t.from}`}</div>
                      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                        <span style={{color:"#888",fontSize:12}}>{fmtN(t.poids_brut,3)} kg brut</span>
                        <span style={{fontWeight:700}}>= {fmtN(t.qty_net,3)} kg cru net</span>
                      </div>
                      {t.note&&<div style={{fontSize:12,color:"#999",marginTop:4,fontStyle:"italic"}}>{t.note}</div>}
                    </div>
                  );
                })}
              </div>
            }
          </div>
        )}
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════════════
  // CONTRÔLE VIEW
  // ════════════════════════════════════════════════════════════════════════
  const renderControle=()=>{
    const totals=params.proteines.map(pp=>({pp,cv:calcCtrlProt(ctrlRest,ctrlSem,pp)}));
    const totalTheo=totals.reduce((s,t)=>s+t.cv.theo_net,0);
    const totalReel=totals.reduce((s,t)=>s+t.cv.conso_reelle,0);
    const totalEcart=totalReel-totalTheo;
    const totalPct=totalTheo>0?(totalEcart/totalTheo)*100:0;
    const gCol=ecartColor(totalPct);
    const debOk=isValidated(valKeyDeb(ctrlRest,ctrlSem));
    const finOk=isValidated(valKeyFin(ctrlRest,ctrlSem));

    if(ctrlView==="comparaison") return(
      <div>
        <div style={{marginBottom:14}}><SectionLabel>Semaine</SectionLabel><WeekSelector val={ctrlSem} set={setCtrlSem}/></div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#1a237e"}}>
                <th style={{padding:"8px 12px",color:"#fff",textAlign:"left",fontWeight:600,fontSize:11}}>Restaurant</th>
                {params.proteines.map(pp=><th key={pp.name} colSpan={2} style={{padding:"8px",color:"#fff",textAlign:"center",fontWeight:600,fontSize:11,borderLeft:"1px solid #3949ab"}}>{pp.name}</th>)}
              </tr>
              <tr style={{background:"#283593"}}>
                <th style={{padding:"5px 12px"}}/>
                {params.proteines.flatMap(pp=>[
                  <th key={pp.name+"a"} style={{padding:"5px 8px",color:"#9fa8da",fontSize:10,textAlign:"center",borderLeft:"1px solid #3949ab"}}>Écart kg</th>,
                  <th key={pp.name+"b"} style={{padding:"5px 8px",color:"#9fa8da",fontSize:10,textAlign:"center"}}>Écart %</th>
                ])}
              </tr>
            </thead>
            <tbody>
              {RESTAURANTS.map(rest=>(
                <tr key={rest} style={{borderBottom:"1px solid #f0f0f0"}}>
                  <td style={{padding:"8px 12px",fontWeight:600}}>{rest}</td>
                  {params.proteines.flatMap(pp=>{
                    const cv=calcCtrlProt(rest,ctrlSem,pp);
                    const d=getCtrlProt(rest,ctrlSem,pp.name);
                    if(!d.portions_sig&&!d.portions_opt) return[
                      <td key={pp.name+"a"} style={{padding:"8px",textAlign:"center",color:"#ccc",fontSize:11,borderLeft:"1px solid #f0f0f0"}}>—</td>,
                      <td key={pp.name+"b"} style={{padding:"8px",textAlign:"center",color:"#ccc",fontSize:11}}>—</td>
                    ];
                    const col=ecartColor(cv.ecart_pct);
                    return[
                      <td key={pp.name+"a"} style={{padding:"8px",textAlign:"center",fontWeight:600,color:col.text,borderLeft:"1px solid #f0f0f0"}}>{cv.ecart_kg>=0?"+":""}{fmtN(cv.ecart_kg,2)}</td>,
                      <td key={pp.name+"b"} style={{padding:"8px",textAlign:"center"}}><span style={{background:col.bg,color:col.text,padding:"2px 8px",borderRadius:10,fontWeight:700,fontSize:11}}>{cv.ecart_kg>=0?"+":""}{fmtN(cv.ecart_pct,1)}%</span></td>
                    ];
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );

    return(
      <div>
        <div style={{display:"flex",gap:20,marginBottom:14,flexWrap:"wrap"}}>
          <div><SectionLabel>Semaine</SectionLabel><WeekSelector val={ctrlSem} set={setCtrlSem}/></div>
          <div><SectionLabel>Restaurant</SectionLabel><RestSelector val={ctrlRest} set={setCtrlRest}/></div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {[["Inv. Début",debOk],["Inv. Fin",finOk]].map(([lbl,ok])=>(
            <div key={lbl} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:6,background:ok?"#e8f5e9":"#fff3e0",border:`1px solid ${ok?"#a5d6a7":"#ffe0b2"}`}}>
              <span style={{fontSize:11,fontWeight:600,color:ok?"#2e7d32":"#e65100"}}>{ok?"✓":"⚠"} {lbl}</span>
              <span style={{fontSize:10,color:ok?"#2e7d32":"#e65100"}}>{ok?"Validé":"Non validé"}</span>
            </div>
          ))}
          {(!debOk||!finOk)&&<div style={{fontSize:11,color:"#888",display:"flex",alignItems:"center"}}>→ Validez les inventaires dans l'onglet Inventaire</div>}
        </div>
        <div style={{display:"inline-flex",alignItems:"center",gap:10,background:gCol.bg,borderRadius:8,padding:"10px 18px",marginBottom:16,borderLeft:`3px solid ${gCol.text}`}}>
          <span style={{fontSize:10,fontWeight:700,color:gCol.text,textTransform:"uppercase",letterSpacing:".06em"}}>Écart total</span>
          <span style={{fontSize:18,fontWeight:700,color:gCol.text}}>{totalEcart>=0?"+":""}{fmtN(totalPct,1)}%</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#1a237e"}}>
                {["Protéine","Écart %","Inv. début","Inv. fin","Transfert","Portions Sig.","Portions Opt.","Total","Gram.(g)","Théo net","Cmd brut","Coeff","Cmd net","Conso réelle","Écart (kg)"].map(h=>(
                  <th key={h} style={{padding:"7px 8px",color:"#fff",fontWeight:600,fontSize:10,textAlign:"center",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {params.proteines.map((pp,i)=>{
                const cv=calcCtrlProt(ctrlRest,ctrlSem,pp);
                const col=ecartColor(cv.ecart_pct);
                const d=getCtrlProt(ctrlRest,ctrlSem,pp.name);
                return(
                  <tr key={pp.name} style={{background:i%2===0?"#fafafa":"#fff",borderBottom:"1px solid #efefef"}}>
                    <td style={{padding:"7px 10px",fontWeight:700}}>{pp.name}</td>
                    <td style={{padding:"6px 8px",textAlign:"center"}}><span style={{background:col.bg,color:col.text,padding:"3px 8px",borderRadius:10,fontWeight:700,fontSize:11}}>{cv.ecart_kg>=0?"+":""}{fmtN(cv.ecart_pct,1)}%</span></td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:debOk?"#2e7d32":"#aaa",fontWeight:debOk?700:400,fontSize:11}}>{fmtN(cv.inv_debut,3)}{debOk&&<span style={{fontSize:9,color:"#a5d6a7",marginLeft:3}}>✓</span>}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:finOk?"#2e7d32":"#aaa",fontWeight:finOk?700:400,fontSize:11}}>{fmtN(cv.inv_fin,3)}{finOk&&<span style={{fontSize:9,color:"#a5d6a7",marginLeft:3}}>✓</span>}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:cv.trans_net>=0?"#2e7d32":"#c62828",fontWeight:600,fontSize:11}}>{cv.trans_net>=0?"+":""}{fmtN(cv.trans_net,3)}</td>
                    <td style={{padding:"6px 8px",textAlign:"center"}}><input type="number" min="0" value={d.portions_sig||""} placeholder="0" onChange={e=>updateCtrlProt(ctrlRest,ctrlSem,pp.name,"portions_sig",e.target.value)} style={{width:58,padding:"3px 5px",border:"1px solid #ddd",borderRadius:4,fontSize:11,textAlign:"center",background:"#fffde7"}}/></td>
                    <td style={{padding:"6px 8px",textAlign:"center"}}><input type="number" min="0" value={d.portions_opt||""} placeholder="0" onChange={e=>updateCtrlProt(ctrlRest,ctrlSem,pp.name,"portions_opt",e.target.value)} style={{width:58,padding:"3px 5px",border:"1px solid #ddd",borderRadius:4,fontSize:11,textAlign:"center",background:"#fffde7"}}/></td>
                    <td style={{padding:"6px 8px",textAlign:"center",fontWeight:700,color:"#1a237e"}}>{cv.total_p||"—"}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:"#888"}}>{pp.grammage}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",fontWeight:600,color:"#1a237e"}}>{fmtN(cv.theo_net,3)}</td>
                    <td style={{padding:"6px 8px",textAlign:"center"}}><input type="number" min="0" value={d.cmd_brut||""} placeholder="0" onChange={e=>updateCtrlProt(ctrlRest,ctrlSem,pp.name,"cmd_brut",e.target.value)} style={{width:62,padding:"3px 5px",border:"1px solid #ddd",borderRadius:4,fontSize:11,textAlign:"center",background:"#fffde7"}}/></td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:"#888"}}>{pp.coeff}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",color:"#555"}}>{fmtN(cv.cmd_net,3)}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",fontWeight:700,color:"#e65100"}}>{fmtN(cv.conso_reelle,3)}</td>
                    <td style={{padding:"6px 8px",textAlign:"center",fontWeight:700,color:col.text}}>{cv.ecart_kg>=0?"+":""}{fmtN(cv.ecart_kg,3)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{background:"#e8eaf6",borderTop:"2px solid #1a237e"}}>
                <td colSpan={9} style={{padding:"7px 10px",fontWeight:700}}>TOTAL</td>
                <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:"#1a237e"}}>{fmtN(totalTheo,3)}</td>
                <td colSpan={3}/>
                <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:"#e65100"}}>{fmtN(totalReel,3)}</td>
                <td style={{padding:"7px 8px",textAlign:"center",fontWeight:700,color:gCol.text}}>{totalEcart>=0?"+":""}{fmtN(totalEcart,3)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
        <div style={{marginTop:8,fontSize:10,color:"#bbb"}}>* Cases jaunes = saisie manuelle · ✓ = inventaire validé</div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════════════
  // PARAMÈTRES VIEW
  // ════════════════════════════════════════════════════════════════════════
  const renderParams=()=>{
    return(
      <div style={{display:"flex",flexDirection:"column",gap:24}}>
        <div>
          <SectionLabel>Protéines — états & coefficients</SectionLabel>
          {params.proteines.map((pp,pi)=>(
            <div key={pp.name} style={{background:"#fafaf8",borderRadius:8,border:"1px solid #eee",marginBottom:12,overflow:"hidden"}}>
              <div style={{background:"#1a237e",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:700,color:"#fff",fontSize:13}}>{pp.name}</span>
                <div style={{display:"flex",gap:16,fontSize:12,color:"#c5cae9"}}>
                  <span>Grammage : <strong style={{color:"#fff"}}>{pp.grammage} g</strong></span>
                  <span>Coeff rendement : <strong style={{color:"#fff"}}>{pp.coeff}</strong></span>
                </div>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"#f5f5f5"}}>{["État","Coeff → cru net","Exemple"].map(h=><th key={h} style={{padding:"6px 12px",textAlign:"left",fontWeight:600,fontSize:10,color:"#888"}}>{h}</th>)}</tr></thead>
                <tbody>
                  {pp.etats.map((e,ei)=>(
                    <tr key={e.name} style={{borderBottom:"1px solid #f0f0f0"}}>
                      <td style={{padding:"7px 12px",fontWeight:500}}>{e.name}</td>
                      <td style={{padding:"7px 12px"}}><input type="number" step="0.001" value={e.coeff_cru} onChange={ev=>{ const np=[...params.proteines]; np[pi]={...np[pi],etats:np[pi].etats.map((et,i)=>i===ei?{...et,coeff_cru:parseFloat(ev.target.value)||0}:et)}; saveParams({...params,proteines:np}); }} style={{width:80,padding:"4px 8px",border:"1px solid #ddd",borderRadius:4,fontSize:12,background:"#fffde7",textAlign:"center"}}/></td>
                      <td style={{padding:"7px 12px",color:"#888",fontSize:11}}>1 kg {e.name.toLowerCase()} = {fmtN(e.coeff_cru,3)} kg cru net</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ))}
        </div>
        <div>
          <SectionLabel>Types de bacs & tares</SectionLabel>
          <div style={{background:"#fafaf8",borderRadius:8,border:"1px solid #eee",overflow:"hidden"}}>
            {params.bacs.length===0?<div style={{padding:"20px",textAlign:"center",color:"#bbb",fontSize:12}}>Aucun bac configuré</div>
            :<table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"#f5f5f5"}}>{["Nom","Tare (kg)",""].map(h=><th key={h} style={{padding:"6px 12px",textAlign:"left",fontWeight:600,fontSize:10,color:"#888"}}>{h}</th>)}</tr></thead>
              <tbody>{params.bacs.map((b,bi)=>(
                <tr key={bi} style={{borderBottom:"1px solid #f0f0f0"}}>
                  <td style={{padding:"7px 12px"}}>{b.name}</td>
                  <td style={{padding:"7px 12px"}}><input type="number" step="0.01" value={b.tare} onChange={e=>{ const nb=[...params.bacs]; nb[bi]={...nb[bi],tare:parseFloat(e.target.value)||0}; saveParams({...params,bacs:nb}); }} style={{width:80,padding:"4px 8px",border:"1px solid #ddd",borderRadius:4,fontSize:12,background:"#fffde7",textAlign:"center"}}/> <span style={{color:"#888",fontSize:11}}>kg</span></td>
                  <td style={{padding:"7px 12px"}}><button onClick={()=>saveParams({...params,bacs:params.bacs.filter((_,i)=>i!==bi)})} style={{color:"#dc2626",background:"none",border:"none",cursor:"pointer",fontSize:12}}>Supprimer</button></td>
                </tr>
              ))}</tbody>
            </table>}
            <div style={{padding:"10px 12px",borderTop:"1px solid #eee",display:"flex",gap:8,alignItems:"flex-end"}}>
              <div><div style={{fontSize:10,color:"#888",marginBottom:3}}>Nom</div><input value={newBac.name} onChange={e=>setNewBac({...newBac,name:e.target.value})} placeholder="ex: Bac GN 1/1" style={{padding:"5px 8px",borderRadius:6,border:"1px solid #ddd",fontSize:12,width:160}}/></div>
              <div><div style={{fontSize:10,color:"#888",marginBottom:3}}>Tare (kg)</div><input type="number" value={newBac.tare} onChange={e=>setNewBac({...newBac,tare:e.target.value})} placeholder="0.00" style={{padding:"5px 8px",borderRadius:6,border:"1px solid #ddd",fontSize:12,width:80}}/></div>
              <button onClick={()=>{ if(!newBac.name||!newBac.tare) return; saveParams({...params,bacs:[...params.bacs,{name:newBac.name,tare:parseFloat(newBac.tare)}]}); setNewBac({name:"",tare:""}); }} style={{padding:"5px 14px",background:"#1a237e",color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Ajouter</button>
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ════════════════════════════════════════════════════════════════════════
  // ACHATS VIEW
  // ════════════════════════════════════════════════════════════════════════
  const renderAchats=()=>(
    <>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
        <span style={{fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:".06em"}}>Période</span>
        <div style={{display:"flex",gap:4}}>
          {["Tous",...MOIS].map(m=><button key={m} onClick={()=>setMoisFilter(m)} style={{fontSize:11,padding:"4px 10px",borderRadius:16,border:"1px solid",borderColor:moisFilter===m?"#111":"#e0e0e0",background:moisFilter===m?"#111":"#fff",color:moisFilter===m?"#fff":"#666",cursor:"pointer",fontWeight:moisFilter===m?600:400}}>{m}</button>)}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {[["Total",fmtK(globalTotal),moisFilter==="Tous"?`${MOIS.length} mois`:moisFilter,"#111"],...FOURNISSEURS.map(f=>{ const{total:t}=rowsFor(f); return[f,fmtK(t),t>0?pct(t,globalTotal)+" du total":"—",t>0?COLORS[f]?.accent||"#555":"#bbb"]; })].map(([lbl,val,sub,accent])=>(
          <div key={lbl} style={{background:"#f8f8f6",borderRadius:8,padding:"10px 14px",flex:1,minWidth:100}}>
            <div style={{fontSize:9,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>{lbl}</div>
            <div style={{fontSize:15,fontWeight:700,color:accent}}>{val}</div>
            <div style={{fontSize:9,color:"#999",marginTop:1}}>{sub}</div>
          </div>
        ))}
      </div>
      <div style={{borderBottom:"2px solid #f0f0ee",marginBottom:12,display:"flex",overflowX:"auto"}}>
        {FOURNISSEURS.map(f=><button key={f} onClick={()=>{setTab(f);setAchatsView("ingredients");}} style={{padding:"6px 12px",fontSize:11,fontWeight:tab===f?600:400,color:tab===f?"#111":"#666",background:"transparent",border:"none",borderBottom:tab===f?"2px solid #111":"2px solid transparent",cursor:"pointer",marginBottom:-2,whiteSpace:"nowrap"}}>{f}</button>)}
      </div>
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {[["ingredients","Par ingrédient"],["restaurants","Par restaurant"],["saisie","Saisie"]].map(([v,l])=><button key={v} onClick={()=>setAchatsView(v)} style={{fontSize:11,padding:"4px 11px",borderRadius:18,border:"1px solid",borderColor:achatsView===v?c.accent:"#e0e0e0",background:achatsView===v?c.accent:"#fff",color:achatsView===v?"#fff":"#666",cursor:"pointer",fontWeight:achatsView===v?600:400}}>{l}</button>)}
      </div>
      {achatsView==="ingredients"&&(ings.length===0?<div style={{textAlign:"center",padding:"32px 0",color:"#bbb"}}>Aucune donnée</div>:
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:11,color:"#888"}}>{ings.length} références</span><span style={{fontSize:12,fontWeight:700,color:c.accent}}>{fmt(total)}</span></div>
          <div style={{background:c.bg,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontSize:10,fontWeight:600,color:c.text,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Top 5 — {pct(ings.slice(0,5).reduce((s,[,v])=>s+v.montant,0),total)} du total</div>
            {ings.slice(0,5).map(([ing,{montant:amt,qty,unit}],i)=>(
              <div key={ing} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 0",borderBottom:i<4?`1px solid ${c.light}`:"none",alignItems:"center"}}>
                <span style={{color:c.text}}>{["🥇","🥈","🥉","4️⃣","5️⃣"][i]} {ing}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {qty>0&&<span style={{fontSize:10,color:c.text,background:c.light,padding:"1px 6px",borderRadius:4}}>{qty} {unit}</span>}
                  <span style={{fontWeight:700,color:c.accent}}>{fmt(amt)}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{borderBottom:"2px solid #f0f0ee"}}>{["#","Ingrédient","Qté","Unité","Montant HT","%",""].map((h,i)=><th key={i} style={{padding:"5px 8px",color:"#888",fontWeight:600,fontSize:10,textAlign:i>=4?"right":i===2?"center":"left"}}>{h}</th>)}</tr></thead>
              <tbody>
                {ings.map(([ing,{montant:amt,qty,unit}],i)=>{ const w=total>0?Math.min((amt/total)*100,100):0; return(
                  <tr key={ing} style={{borderBottom:"1px solid #f8f8f6",background:i<5?"#fffbeb":"transparent"}}>
                    <td style={{padding:"5px 8px",color:"#ccc",fontSize:10}}>{i+1}</td>
                    <td style={{padding:"5px 8px",fontWeight:i<3?600:400}}>{ing}</td>
                    <td style={{padding:"5px 8px",textAlign:"center",fontWeight:600,color:c.accent}}>{qty>0?qty:"—"}</td>
                    <td style={{padding:"5px 8px",color:"#888",fontSize:10}}>{unit||"—"}</td>
                    <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600}}>{fmt(amt)}</td>
                    <td style={{padding:"5px 8px",textAlign:"right",color:"#888",fontSize:10}}>{pct(amt,total)}</td>
                    <td style={{padding:"5px 8px"}}><div style={{background:"#f0f0ee",borderRadius:3,height:5}}><div style={{width:`${w.toFixed(0)}%`,height:5,background:c.accent,borderRadius:3}}/></div></td>
                  </tr>); })}
              </tbody>
              <tfoot><tr style={{borderTop:"2px solid #e0e0e0",background:"#f8f8f6"}}><td colSpan={4} style={{padding:"6px 8px",fontWeight:700,fontSize:11}}>TOTAL</td><td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,color:c.accent,fontSize:12}}>{fmt(total)}</td><td colSpan={2}/></tr></tfoot>
            </table>
          </div>
        </div>
      )}
      {achatsView==="restaurants"&&(rests.length===0?<div style={{textAlign:"center",padding:"32px 0",color:"#bbb"}}>Aucune donnée</div>:
        <div>{rests.map(([r,amt],i)=>(
          <div key={r} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderBottom:"1px solid #f0f0ee"}}>
            <span style={{fontSize:12,flex:1,fontWeight:600}}>{r}</span>
            <div style={{width:100,background:"#f0f0ee",borderRadius:3,height:6}}><div style={{width:`${total>0?Math.min((amt/total)*100,100):0}%`,height:6,background:RC[i%RC.length],borderRadius:3}}/></div>
            <span style={{fontSize:12,fontWeight:600,minWidth:72,textAlign:"right"}}>{fmt(amt)}</span>
            <span style={{fontSize:10,color:"#aaa",minWidth:34,textAlign:"right"}}>{pct(amt,total)}</span>
          </div>
        ))}</div>
      )}
      {achatsView==="saisie"&&(
        <div>
          <div style={{background:"#fafaf8",borderRadius:10,padding:14,marginBottom:14,border:"1px solid #eee"}}>
            <div style={{fontSize:12,fontWeight:600,color:"#444",marginBottom:10}}>Ajouter une ligne</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              {[["Fournisseur","fournisseur",FOURNISSEURS],["Restaurant","restaurant",RESTAURANTS],["Mois","mois",MOIS]].map(([lbl,k,opts])=>(
                <div key={k}><div style={{fontSize:10,color:"#888",marginBottom:3}}>{lbl}</div><select value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} style={{width:"100%",padding:"5px 7px",borderRadius:5,border:"1px solid #ddd",fontSize:11}}>{opts.map(o=><option key={o}>{o}</option>)}</select></div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 60px 90px 100px auto",gap:8,alignItems:"flex-end"}}>
              {[["Ingrédient","ingredient","text","ex: Riz rouge"],["Qté","qty","number","0"],["Unité","unit","text","ex: kg"],["Montant HT","montant","number","0.00"]].map(([lbl,k,type,ph])=>(
                <div key={k}><div style={{fontSize:10,color:"#888",marginBottom:3}}>{lbl}</div><input type={type} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addAchatLine()} placeholder={ph} style={{width:"100%",padding:"5px 7px",borderRadius:5,border:"1px solid #ddd",fontSize:11,boxSizing:"border-box"}}/></div>
              ))}
              <button onClick={addAchatLine} style={{padding:"5px 12px",background:"#111",color:"#fff",border:"none",borderRadius:5,fontSize:11,fontWeight:600,cursor:"pointer"}}>+ Ajouter</button>
            </div>
          </div>
          {Object.entries(achats).filter(([k])=>{ const[f,,m]=k.split("__"); return f===tab&&(moisFilter==="Tous"||m===moisFilter); }).map(([key,lines])=>{
            const[,rest,mois]=key.split("__"); const tot=lines.reduce((s,l)=>s+l.montant,0);
            return(<div key={key} style={{marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,fontSize:11,fontWeight:600,color:"#888"}}><span style={{background:c.bg,color:c.text,borderRadius:4,padding:"1px 5px"}}>{rest}</span><span>{mois}</span><span style={{marginLeft:"auto",color:c.accent,fontWeight:700}}>{fmt(tot)}</span></div>
              {lines.map((l,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 7px",background:"#fafaf8",borderRadius:4,marginBottom:2}}><span style={{flex:1,fontSize:11}}>{l.ingredient}</span>{l.qty>0&&<span style={{fontSize:10,color:"#888",background:"#f0f0ee",padding:"1px 5px",borderRadius:3}}>{l.qty} {l.unit}</span>}<span style={{fontSize:11,fontWeight:600}}>{fmt(l.montant)}</span><button onClick={()=>delAchatLine(key,i)} style={{fontSize:11,color:"#dc2626",background:"none",border:"none",cursor:"pointer"}}>✕</button></div>))}
            </div>);
          })}
        </div>
      )}
    </>
  );

  // ── RENDER ────────────────────────────────────────────────────────────────
  const TABS=[{id:"achats",label:"📦 Achats"},{id:"inventaire",label:"📋 Inventaire"},{id:"controle",label:"🔬 Contrôle"},{id:"params",label:"⚙️ Paramètres"}];

  if(!isLoaded) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:200,gap:12}}>
      <div style={{width:32,height:32,border:"3px solid #e0e0e0",borderTop:"3px solid #1a237e",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:12,color:"#888"}}>Chargement des données…</div>
    </div>
  );

  return(
    <div style={{fontFamily:"system-ui,sans-serif",padding:"16px",color:"#111",maxWidth:980,margin:"0 auto"}}>
      {/* Global CSS — supprime les flèches sur tous les navigateurs */}
      <style>{`
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number] { -moz-appearance:textfield; appearance:textfield; }
        @keyframes spin { to { transform:rotate(360deg); } }
      `}</style>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",color:"#aaa",textTransform:"uppercase",marginBottom:1}}>ILIA · Food Cost</div>
          <div style={{fontSize:18,fontWeight:700}}>{{achats:"Achats fournisseurs",inventaire:"Inventaire protéines",controle:"Contrôle hebdomadaire",params:"Paramètres"}[mode]}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {saved&&<span style={{fontSize:11,color:"#059669"}}>✓ Sauvegardé</span>}
          <button onClick={async()=>{ if(!window.confirm("Réinitialiser les achats ?")) return; try{await window.storage.delete(SK.achats);}catch{} setAchats(INIT_ACHATS); }} style={{fontSize:11,color:"#dc2626",background:"none",border:"1px solid #fecaca",borderRadius:5,padding:"3px 9px",cursor:"pointer"}}>Reset</button>
        </div>
      </div>

      <div style={{display:"flex",gap:4,marginBottom:20,padding:"4px",background:"#f0f0ee",borderRadius:10,width:"fit-content"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setMode(t.id)} style={{padding:"7px 14px",fontSize:12,fontWeight:mode===t.id?700:400,background:mode===t.id?"#fff":"transparent",color:mode===t.id?"#111":"#888",border:"none",borderRadius:7,cursor:"pointer",boxShadow:mode===t.id?"0 1px 4px rgba(0,0,0,.1)":"none",transition:"all .15s",whiteSpace:"nowrap"}}>{t.label}</button>)}
      </div>

      {mode==="achats"     && renderAchats()}
      {mode==="inventaire" && renderInventaire()}
      {mode==="controle"   && (
        <div>
          <div style={{display:"flex",gap:4,marginBottom:14}}>
            {[["detail","Par restaurant"],["comparaison","Comparaison"]].map(([v,l])=><button key={v} onClick={()=>setCtrlView(v)} style={{fontSize:11,padding:"4px 12px",borderRadius:18,border:"1px solid",borderColor:ctrlView===v?"#1a237e":"#e0e0e0",background:ctrlView===v?"#1a237e":"#fff",color:ctrlView===v?"#fff":"#666",cursor:"pointer",fontWeight:ctrlView===v?600:400}}>{l}</button>)}
          </div>
          {renderControle()}
        </div>
      )}
      {mode==="params" && renderParams()}

      <div style={{marginTop:20,fontSize:10,color:"#ddd",textAlign:"center"}}>ILIA Groupe © 2026</div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
