// ── Zelty API (direct depuis le navigateur) ───────────────────────────────
const ZELTY_API_KEY = "MTk5NzQ6V6HdyWUYGuZhFNX50WjTC4dad8=";
const ZELTY_BASE    = "https://api.zelty.fr/2.10";
const ZELTY_RESTOS  = {Washington:7022, Mathurins:9080, Riviere:9185, Casanova:9281, Vernier:9283};
const PROTEINES_SIG = {Saumon:["Jul's Bowl"], Thon:["Fish Bowl"], Boeuf:["Meat Bowl"], Poulet:["John's Bowl"]};
const PROTEINES_OPT = {
  Saumon: ["Saumon zaatar  ♨️","Saumon zaatar ♨️","Saumon Zaatar","Saumon zaatar"],
  Thon:   ["Thon mi-cuit","Thon mi cuit"],
  Boeuf:  ["Boeuf Effiloché","Boeuf effiloché"],
  Poulet: ["Poulet mariné aux épices ♨️","Poulet Grillé","Poulet grillé"]
};
const GRAMMAGES = {Saumon:100, Thon:80, Boeuf:70, Poulet:130};

async function fetchVentesZelty(restaurant, date) {
  const restoId = ZELTY_RESTOS[restaurant];
  if (!restoId) throw new Error("Restaurant inconnu: " + restaurant);
  const from = `${date}T10:00:00`;
  const to   = `${date}T15:00:00`;
  const counts = {Saumon:{sig:0,opt:0}, Thon:{sig:0,opt:0}, Boeuf:{sig:0,opt:0}, Poulet:{sig:0,opt:0}};
  let offset = 0, hasMore = true;
  while (hasMore) {
    const url = `${ZELTY_BASE}/orders?restaurant_id=${restoId}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&expand[]=items&limit=200&offset=${offset}`;
    const resp = await fetch(url, {headers:{"Authorization":`Bearer ${ZELTY_API_KEY}`}});
    if (!resp.ok) throw new Error("Erreur Zelty: " + resp.status);
    const data = await resp.json();
    const orders = data.orders || [];
    orders.forEach(order => {
      (order.items || []).forEach(item => {
        const name = item.name || "";
        if (item.type === "dish") {
          for (const prot in PROTEINES_SIG) {
            if (PROTEINES_SIG[prot].includes(name)) counts[prot].sig += (item.quantity || 1);
          }
        }
        (item.modifiers || []).forEach(mod => {
          const mname = mod.name || "";
          for (const prot in PROTEINES_OPT) {
            if (PROTEINES_OPT[prot].includes(mname)) counts[prot].opt += 1;
          }
        });
      });
    });
    offset += orders.length;
    if (orders.length < 200) hasMore = false;
  }
  const ventes = {};
  for (const p in counts) {
    const total = counts[p].sig + counts[p].opt;
    ventes[p] = {portions_sig:counts[p].sig, portions_opt:counts[p].opt, total_portions:total, grammage_theo_g:GRAMMAGES[p], theo_net_kg:Math.round(total*GRAMMAGES[p])/1000};
  }
  return ventes;
}

// ── Sync vers Google Sheets via Apps Script (GET + param data) ───────────
async function syncToSheets(payload) {
  if (!APPS_SCRIPT_URL) return;
  try {
    const encoded = encodeURIComponent(JSON.stringify(payload));
    await fetch(`${APPS_SCRIPT_URL}?data=${encoded}`, { mode: "no-cors" });
  } catch(e) { console.warn("syncToSheets error:", e); }
}

async function syncInventaireToSheets(restaurant, semaine, proteine, type, lignes, valide) {
  return syncToSheets({ action: "saveInventaire", restaurant, semaine, proteine, type, lignes, valide });
}

async function syncTransfertToSheets(transfert) {
  // Normalise "sem" → "semaine" pour le Apps Script
  const payload = { action: "saveTransfert", ...transfert, semaine: transfert.sem || transfert.semaine || "" };
  return syncToSheets(payload);
}

// ── PURE HELPERS ──────────────────────────────────────────────────────────
const fmtN = (n, d=2) => (n == null || isNaN(n)) ? "—" : Number(n).toFixed(d);

// Convertit "S16" → "25/04" (vendredi de la semaine ISO, année courante)
const semToDate = sem => {
  const m = sem.match(/^S(\d+)$/);
  if (!m) return sem;
  const week = parseInt(m[1]);
  const year = new Date().getFullYear();
  const jan4 = new Date(year, 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const friday = new Date(startOfWeek1);
  friday.setDate(startOfWeek1.getDate() + (week - 1) * 7 + 4);
  return `${friday.getDate().toString().padStart(2,"0")}/${(friday.getMonth()+1).toString().padStart(2,"0")}`;
};

// Retourne la semaine ISO courante sous forme "S16"
const getCurrentWeek = () => {
  const now = new Date();
  const jan4 = new Date(now.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const diff = now - startOfWeek1;
  const week = Math.floor(diff / (7 * 24 * 3600 * 1000)) + 1;
  return `S${week}`;
};

// Génère dynamiquement les semaines : 8 passées + semaine courante + 4 futures
const generateWeeks = () => {
  const current = parseInt(getCurrentWeek().replace("S",""));
  const weeks = [];
  for (let i = current - 8; i <= current + 4; i++) {
    if (i > 0 && i <= 52) weeks.push(`S${i}`);
  }
  return weeks;
};
const WEEKS = generateWeeks();

const prevWeek = sem => {
  const idx = WEEKS.indexOf(sem);
  if (idx > 0) return WEEKS[idx - 1];
  const m = sem.match(/^S(\d+)$/);
  return m ? `S${parseInt(m[1]) - 1}` : null;
};

const nextWeek = sem => {
  const idx = WEEKS.indexOf(sem);
  if (idx >= 0 && idx < WEEKS.length - 1) return WEEKS[idx + 1];
  const m = sem.match(/^S(\d+)$/);
  return m ? `S${parseInt(m[1]) + 1}` : null;
};

const getCoeffCruPure = (params, protName, etatName) => {
  const pp = params.proteines.find(p => p.name === protName);
  if (!pp) return 1;
  const e = pp.etats.find(e => e.name === etatName);
  return e ? e.coeff_cru : 1;
};

const calcEquivCru = (poids_brut, tare, coeff_cru) =>
  Math.max(0, (poids_brut || 0) - (tare || 0)) * coeff_cru;

const calcTotalFromLines = (lines, protName, params) =>
  (lines || []).reduce(
    (s, l) => s + calcEquivCru(l.poids_brut, l.tare, getCoeffCruPure(params, protName, l.etat)),
    0
  );

// ── NUM INPUT (module level — stable reference, pas de focus loss) ─────────
function NumInput({value, onChange, placeholder="0"}) {
  const [local, setLocal] = useState(String(value ?? ""));
  useEffect(() => { setLocal(String(value ?? "")); }, [value]);
  return (
    <input
      type="text"
      inputMode="decimal"
      value={local}
      placeholder={placeholder}
      onChange={e => {
        const raw = e.target.value.replace(",", ".");
        setLocal(e.target.value);
        onChange(raw);
      }}
      style={{
        width: "100%", padding: "12px", border: "1px solid #ddd",
        borderRadius: 8, fontSize: 18, textAlign: "center",
        background: "#fffde7", boxSizing: "border-box"
      }}
    />
  );
}

// ── INV BLOCK (module level — stable reference) ───────────────────────────
function InvBlock({lines, pp, params, readOnly, colorAccent, isValidatedBlock, onAdd, onUpdate, onDel}) {
  const total_equiv = calcTotalFromLines(lines, pp.name, params);
  return (
    <div style={{background:"#fafaf8",borderRadius:10,border:`1px solid ${isValidatedBlock?"#a5d6a7":"#eee"}`,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:isValidatedBlock?"#2e7d32":colorAccent}}>
        <span style={{fontWeight:700,fontSize:13,color:"#fff"}}>{pp.name}</span>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.75)"}}>
          Équiv. cru net : <strong style={{color:"#fff"}}>{fmtN(total_equiv,3)} kg</strong>
        </span>
      </div>
      <div style={{padding:"10px 14px"}}>
        {lines.length > 0 && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 80px 24px",gap:6,marginBottom:6}}>
            {["État","Poids brut","Tare","Poids net","Équiv. cru net",""].map((h, i) => (
              <div key={i} style={{fontSize:9,color:"#aaa",fontWeight:600,textAlign:i>0?"center":"left",textTransform:"uppercase"}}>{h}</div>
            ))}
          </div>
        )}
        {lines.map((l, idx) => {
          const net   = Math.max(0, (l.poids_brut||0) - (l.tare||0));
          const equiv = calcEquivCru(l.poids_brut, l.tare, getCoeffCruPure(params, pp.name, l.etat));
          return (
            <div key={idx} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 80px 24px",gap:6,marginBottom:6,alignItems:"center"}}>
              {readOnly
                ? <span style={{fontSize:11,color:"#555",fontWeight:500}}>{l.etat||"—"}</span>
                : <select value={l.etat} onChange={e => onUpdate(idx,"etat",e.target.value)}
                    style={{padding:"4px 5px",borderRadius:4,border:"1px solid #ddd",fontSize:11,background:"#fffde7"}}>
                    <option value="">— État —</option>
                    {pp.etats.map(e => <option key={e.name}>{e.name}</option>)}
                  </select>
              }
              {readOnly
                ? <div style={{textAlign:"center",fontSize:11,color:"#555"}}>{fmtN(l.poids_brut,3)}</div>
                : <NumInput value={l.poids_brut} onChange={v => onUpdate(idx,"poids_brut",v)}/>
              }
              {readOnly
                ? <div style={{textAlign:"center",fontSize:11,color:"#555"}}>{fmtN(l.tare,3)}</div>
                : <NumInput value={l.tare} onChange={v => onUpdate(idx,"tare",v)}/>
              }
              <div style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#555"}}>{fmtN(net,3)}</div>
              <div style={{textAlign:"center",fontSize:11,fontWeight:700,color:isValidatedBlock?"#2e7d32":colorAccent}}>{fmtN(equiv,3)}</div>
              {readOnly
                ? <div/>
                : <button onClick={() => onDel(idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:13,padding:0}}>✕</button>
              }
            </div>
          );
        })}
        {!readOnly && (
          <button onClick={onAdd} style={{fontSize:11,padding:"4px 12px",background:"#e8eaf6",color:colorAccent,border:"none",borderRadius:6,cursor:"pointer",fontWeight:600,marginTop:4}}>
            + Ajouter ligne
          </button>
        )}
      </div>
      {lines.length > 0 && (
        <div style={{padding:"7px 14px",background:"rgba(0,0,0,0.04)",display:"flex",justifyContent:"flex-end",gap:8,alignItems:"center"}}>
          <span style={{fontSize:11,color:"#666"}}>Total équiv. cru net</span>
          <span style={{fontSize:14,fontWeight:700,color:isValidatedBlock?"#2e7d32":colorAccent}}>{fmtN(total_equiv,3)} kg</span>
        </div>
      )}

  );
}

  const [validated,   setValidated]   = useState({});
  const [forceManual, setForceManual] = useState({});
  const [isLoaded,    setIsLoaded]    = useState(false);
  const [saved,       setSaved]       = useState(false);

  // Inventaire UI
  const [invSem,  setInvSem]  = useState(getCurrentWeek);
  const weekScrollRef = useRef(null);
  const [mainTab, setMainTab] = useState("semaine"); // semaine | journalier | transfert
  const [invRest, setInvRest] = useState("Washington");
  const [invMobileSection, setInvMobileSection] = useState("fin"); // fin | transfert
  const [invMobileProtIdx, setInvMobileProtIdx] = useState(0);

  // ── Journalier state ─────────────────────────────────────────────────────
  const [jourRest,    setJourRest]    = useState("Washington");
  const [jourDate,    setJourDate]    = useState(new Date().toISOString().split("T")[0]);
  const [jourProtIdx, setJourProtIdx] = useState(0);
  const [jourVentes,  setJourVentes]  = useState(null); // résultat getVentesJour
  const [jourLoading, setJourLoading] = useState(false);
  const [jourDebut,   setJourDebut]   = useState({}); // {Saumon: [{etat,poids_brut}], ...}
  const [jourFin,     setJourFin]     = useState({}); // idem
  const [jourSaved,   setJourSaved]   = useState({});  // {Saumon: true, ...}

  // Transfert form
  const [transForm, setTransForm] = useState({
    to: RESTAURANTS[1],
    prot: DEFAULT_PARAMS.proteines[0]?.name || "",
    etat: "",
    poids_brut: "",
    tare: "",
    note: ""
  });
  const [showTrans, setShowTrans] = useState(false);

  // ── Chargement depuis localStorage ──────────────────────────────────────
  useEffect(() => {
    (async () => {
      const load = async (key, setter, fallback) => {
        try {
          const r = await window.storage.get(key);
          if (r && r.value) setter(JSON.parse(r.value));
          else if (fallback !== undefined) setter(fallback);
        } catch {
          if (fallback !== undefined) setter(fallback);
        }
      };
      await Promise.all([
        load(SK.params,    setParams,      DEFAULT_PARAMS),
        load(SK.inv,       setInvData,     {}),
        load(SK.trans,     setTransfers,   []),
        load(SK.validated, setValidated,   {}),
        load(SK.force,     setForceManual, {}),
      ]);
      setIsLoaded(true);
    })();
  }, []);

  // ── Persistance ──────────────────────────────────────────────────────────
  const persist = useCallback(async (key, val) => {
    try {
      await window.storage.set(key, JSON.stringify(val));
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
    } catch(e) {
      console.error("Storage error:", e);
    }
  }, []);

  const saveParams    = d => { setParams(d);      persist(SK.params,    d); };
  const saveInv       = d => { setInvData(d);     persist(SK.inv,       d); };
  const saveTrans     = d => { setTransfers(d);   persist(SK.trans,     d); };
  const saveValidated = d => { setValidated(d);   persist(SK.validated, d); };
  const saveForce     = d => { setForceManual(d); persist(SK.force,     d); };

  // ── Clés inventaire ──────────────────────────────────────────────────────
  const finKey    = (rest, sem) => `invfin__${rest}__${sem}`;
  const debKey    = (rest, sem) => `invdeb__${rest}__${sem}`;
  const valKeyDeb = (rest, sem) => `deb__${rest}__${sem}`;
  const valKeyFin = (rest, sem) => `fin__${rest}__${sem}`;

  const getLines   = (sk, prot) => (invData[sk]?.[prot]?.lines) || [];
  const setLines   = (sk, prot, lines) =>
    saveInv({...invData, [sk]: {...(invData[sk]||{}), [prot]: {lines}}});

  const addLine2    = (sk, prot) =>
    setLines(sk, prot, [...getLines(sk, prot), {etat:"", poids_brut:0, tare:0}]);

  const delLine2    = (sk, prot, idx) => {
    const l = [...getLines(sk, prot)];
    l.splice(idx, 1);
    setLines(sk, prot, l);
  };

  const updateLine2 = (sk, prot, idx, f, v) => {
    const l = [...getLines(sk, prot)];
    if (!l[idx]) l[idx] = {etat:"", poids_brut:0, tare:0};
    l[idx] = {...l[idx], [f]: f === "etat" ? v : (parseFloat(v) || 0)};
    setLines(sk, prot, l);
  };

  const prevHasFin  = (rest, sem) => {
    const prev = prevWeek(sem);
    if (!prev) return false;
    return params.proteines.some(pp => getLines(finKey(rest, prev), pp.name).length > 0);
  };
  const isManualDeb = (rest, sem) => forceManual[`${rest}__${sem}`] || !prevHasFin(rest, sem);

  const getDebutLines = (rest, sem, prot) => {
    if (isManualDeb(rest, sem)) return getLines(debKey(rest, sem), prot);
    const prev = prevWeek(sem);
    return getLines(finKey(rest, prev || ""), prot);
  };
  const getDebutTotal = (rest, sem, prot) =>
    calcTotalFromLines(getDebutLines(rest, sem, prot), prot, params);
  const getFinTotal   = (rest, sem, prot) =>
    calcTotalFromLines(getLines(finKey(rest, sem), prot), prot, params);

  const isValidated = key => !!validated[key];
  const validate    = key => saveValidated({...validated, [key]: true});
  const unvalidate  = key => { const v = {...validated}; delete v[key]; saveValidated(v); };

  // ── Transferts ───────────────────────────────────────────────────────────
  const addTransfer = (from, to, sem, prot, etat, poids_brut, tare, note) => {
    const qty_net = calcEquivCru(
      parseFloat(poids_brut) || 0,
      parseFloat(tare) || 0,
      getCoeffCruPure(params, prot, etat)
    );
    const t = {
      id: Date.now(), from, to, sem, prot, etat,
      poids_brut: parseFloat(poids_brut) || 0,
      tare: parseFloat(tare) || 0,
      qty_net,
      note: note || "",
      date: new Date().toLocaleDateString("fr-FR")
    };
    saveTrans([...transfers, t]);
    syncTransfertToSheets(t);
  };

  const delTransfer = id => saveTrans(transfers.filter(t => t.id !== id));

  const getTransferNet = (rest, sem, prot) => {
    const out = transfers.filter(t => t.from === rest && t.sem === sem && t.prot === prot)
                         .reduce((s, t) => s + t.qty_net, 0);
    const inn = transfers.filter(t => t.to === rest && t.sem === sem && t.prot === prot)
                         .reduce((s, t) => s + t.qty_net, 0);
    return inn - out;
  };

  // ════════════════════════════════════════════════════════════════════════
  // INVENTAIRE VIEW
  // ════════════════════════════════════════════════════════════════════════
  const renderInventaire = () => {
    const prev     = prevWeek(invSem);
    const next     = nextWeek(invSem);
    const isManual = isManualDeb(invRest, invSem);
    const forceKey = `${invRest}__${invSem}`;
    const vkDeb    = valKeyDeb(invRest, invSem);
    const vkFin    = valKeyFin(invRest, invSem);
    const valDeb   = isValidated(vkDeb);
    const valFin   = isValidated(vkFin);

    const invSection  = invMobileSection;
    const setInvSection_ = setInvMobileSection;
    const protIdx    = invMobileProtIdx;
    const setProtIdx_ = setInvMobileProtIdx;

    const pp = params.proteines[protIdx] || params.proteines[0];

    // Restriction de saisie par semaine
    const currentWeek = getCurrentWeek();
    const currentWeekNum = parseInt(currentWeek.replace("S",""));
    const selWeekNum = parseInt(invSem.replace("S",""));
    const isFutureWeek = selWeekNum > currentWeekNum;
    const isPastWeek = selWeekNum < currentWeekNum;
    // Données existantes pour cette semaine/resto
    const hasPastData = isPastWeek && params.proteines.some(p => getLines(finKey(invRest, invSem), p.name).length > 0);
    // Bloqué si : semaine future, ou semaine passée sans données
    const isWeekBlocked = isFutureWeek || (isPastWeek && !hasPastData);

    const sk         = finKey(invRest, invSem);
    const lines      = invSection === "fin" ? getLines(sk, pp.name) : [];
    const skEditable = invSection === "fin" ? finKey(invRest, invSem) : null;
    const isReadOnly = valFin || (isPastWeek && hasPastData);
    const accent     = "#1a237e";
    const totalEquiv = calcTotalFromLines(lines, pp.name, params);
    const vk         = vkFin;
    const isVal      = valFin;

    return (
      <div style={{maxWidth:480, margin:"0 auto"}}>

        {/* ── Semaine ── */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>
            Semaine
          </div>
          <div ref={weekScrollRef} style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {WEEKS.map(w => (
              <button key={w} onClick={() => setInvSem(w)}
                ref={el => { if (el && w === invSem) setTimeout(() => el.scrollIntoView({behavior:"smooth", inline:"start", block:"nearest"}), 50); }}
                style={{flexShrink:0,fontSize:13,padding:"8px 14px",borderRadius:20,border:"1px solid",
                  borderColor:invSem===w?"#1a237e":"#e0e0e0",
                  background:invSem===w?"#1a237e":"#fff",

                  </div>
                  {transForm.poids_brut&&transForm.etat&&(
                    <div style={{padding:"10px 14px",background:"#e8f5e9",borderRadius:8,marginBottom:12,fontSize:13,color:"#2e7d32",fontWeight:600,textAlign:"center"}}>
                      ≡ {fmtN(calcEquivCru(parseFloat(transForm.poids_brut)||0,0,getCoeffCruPure(params,transForm.prot,transForm.etat)),3)} kg cru net
                    </div>
                  )}
                  <button onClick={()=>{
                    if(!transForm.poids_brut||!transForm.etat) return;
                    addTransfer(invRest,transForm.to,invSem,transForm.prot,transForm.etat,transForm.poids_brut,0,transForm.note);
                    setTransForm(f=>({...f,etat:"",poids_brut:"",note:""}));
                    setShowT(false);
                  }} style={{width:"100%",padding:"16px",background:"#e65100",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer"}}>
                    Valider le transfert
                  </button>
                </div>
              )}
              {transfers_this.length===0
                ?<div style={{textAlign:"center",padding:"24px 0",color:"#bbb",fontSize:13}}>Aucun transfert cette semaine</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {transfers_this.map(t=>{
                    const isOut=t.from===invRest;
                    return(
                      <div key={t.id} style={{background:isOut?"#ffebee":"#e8f5e9",borderRadius:10,padding:"12px 14px",fontSize:13}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <span style={{fontWeight:700,color:isOut?"#c62828":"#2e7d32"}}>{isOut?"↗ Sortie":"↙ Entrée"} — {t.prot}</span>
                          <button onClick={()=>delTransfer(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:16,padding:"0 4px"}}>✕</button>
                        </div>
                        <div style={{color:"#555",marginBottom:2}}><span style={{background:"rgba(0,0,0,0.08)",padding:"2px 7px",borderRadius:4,fontSize:12}}>{t.etat}</span> {isOut?`→ ${t.to}`:`← ${t.from}`}</div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                          <span style={{color:"#888",fontSize:12}}>{fmtN(t.poids_brut,3)} kg brut</span>
                          <span style={{fontWeight:700}}>= {fmtN(t.qty_net,3)} kg cru net</span>
                        </div>
                        {t.note&&<div style={{fontSize:12,color:"#999",marginTop:4,fontStyle:"italic"}}>{t.note}</div>}
                      </div>
                    );
                  })}
                </div>
              }
            </div>
          );
        })()}
      </div>
    );
  };

  // ── JOURNALIER ────────────────────────────────────────────────────────────
  const renderJournalier = () => {
    const pp = params.proteines[jourProtIdx] || params.proteines[0];
    const vp = jourVentes?.[pp.name] || null;
    const debutLines = jourDebut[pp.name] || [];
    const finLines   = jourFin[pp.name]   || [];

    const totalDebut = calcTotalFromLines(debutLines, pp.name, params);
    const totalFin   = calcTotalFromLines(finLines,   pp.name, params);
    const conso      = Math.max(0, totalDebut - totalFin);
    const portions   = vp?.total_portions || 0;
    const gramReel   = portions > 0 ? Math.round((conso * 1000 / portions) * 10) / 10 : 0;
    const gramTheo   = pp.grammage;
    const ecart      = gramReel > 0 ? Math.round((gramReel - gramTheo) * 10) / 10 : null;
    const ecartCol   = ecart === null ? {bg:"#f5f5f5",text:"#888"} : Math.abs(ecart) <= 10 ? {bg:"#e8f5e9",text:"#2e7d32"} : Math.abs(ecart) <= 20 ? {bg:"#fff8e1",text:"#f57f17"} : {bg:"#ffebee",text:"#c62828"};
    const isSaved    = !!jourSaved[pp.name];

    const addDebutLine = () => setJourDebut(d=>({...d,[pp.name]:[...(d[pp.name]||[]),{etat:"",poids_brut:0}]}));
    const addFinLine   = () => setJourFin(d=>  ({...d,[pp.name]:[...(d[pp.name]||[]),{etat:"",poids_brut:0}]}));
    const updDebut = (idx,f,v) => setJourDebut(d=>{const l=[...(d[pp.name]||[])];l[idx]={...l[idx],[f]:f==="etat"?v:(parseFloat(v)||0)};return{...d,[pp.name]:l};});
    const updFin   = (idx,f,v) => setJourFin(d=>  {const l=[...(d[pp.name]||[])];l[idx]={...l[idx],[f]:f==="etat"?v:(parseFloat(v)||0)};return{...d,[pp.name]:l};});
    const delDebut = idx => setJourDebut(d=>{const l=[...(d[pp.name]||[])];l.splice(idx,1);return{...d,[pp.name]:l};});
    const delFin   = idx => setJourFin(d=>  {const l=[...(d[pp.name]||[])];l.splice(idx,1);return{...d,[pp.name]:l};});

    const fetchVentes = async () => {
      setJourLoading(true);
      try {
        const PROXY = "https://instantaneous-indigestible-johan.ngrok-free.dev";
        const url = `${PROXY}/?action=getVentesJour&restaurant=${encodeURIComponent(jourRest)}&date=${jourDate}&heure_debut=10:00&heure_fin=15:00`;
        const resp = await fetch(url, {headers:{"ngrok-skip-browser-warning":"true"}});
        const json = await resp.json();
        if (json.ventes) setJourVentes(json.ventes);
        else alert("Erreur: " + (json.error || "réponse invalide"));
      } catch(e) { alert("Erreur réseau: " + e.message); }
      setJourLoading(false);
    };

    const saveJour = () => {
      const missingEtat = [...debutLines,...finLines].filter(l=>!l.etat);
      if(missingEtat.length>0){alert("Sélectionne l'état de chaque ligne avant de valider.");return;}
      if(debutLines.length===0){alert("Ajoute au moins une ligne de stock début.");return;}
      if(!jourVentes){alert("Récupère les ventes avant de valider.");return;}
      syncToSheets({
        action:"saveInventaireJour",
        restaurant:jourRest, date:jourDate, service:"midi",
        proteine:pp.name,
        etat: debutLines.map(l=>l.etat).join("+"),
        stock_debut_kg: totalDebut,
        stock_fin_kg: totalFin,
        total_portions: portions,
        grammage_theo_g: gramTheo
      });
      setJourSaved(s=>({...s,[pp.name]:true}));
    };

    return (
      <div style={{maxWidth:480,margin:"0 auto"}}>
        {/* Restaurant */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Restaurant</div>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {RESTAURANTS.map(r=>(
              <button key={r} onClick={()=>{setJourRest(r);setJourVentes(null);setJourSaved({});}}
                style={{flexShrink:0,fontSize:13,padding:"8px 16px",borderRadius:20,border:"1px solid",
                  borderColor:jourRest===r?"#1a237e":"#e0e0e0",background:jourRest===r?"#1a237e":"#fff",
                  color:jourRest===r?"#fff":"#555",cursor:"pointer",fontWeight:jourRest===r?700:400}}>{r}</button>
            ))}
          </div>
        </div>

        {/* Date */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:700,color:"#888",textTransform:"uppercase",letterSpacing:".07em",marginBottom:6}}>Date</div>
          <input type="date" value={jourDate} onChange={e=>{setJourDate(e.target.value);setJourVentes(null);setJourSaved({});}}
            style={{padding:"10px 14px",borderRadius:20,border:"1px solid #ddd",fontSize:14,background:"#fff",width:"100%",boxSizing:"border-box"}}/>
        </div>

        {/* Service + bouton ventes */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
          <div style={{flex:1,padding:"10px 14px",borderRadius:10,background:"#e8eaf6",fontSize:13,fontWeight:600,color:"#1a237e",textAlign:"center"}}>
            🕙 Midi (10h-15h)
          </div>
          <button onClick={fetchVentes} disabled={jourLoading}
            style={{flex:1,padding:"10px 14px",background:jourVentes?"#e8f5e9":"#1a237e",color:jourVentes?"#2e7d32":"#fff",
              border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {jourLoading?"⏳ Chargement…":jourVentes?"✓ Ventes chargées":"Récupérer les ventes"}
          </button>
        </div>

        {/* Tabs protéines */}
        <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
          {params.proteines.map((p,i)=>(
            <button key={p.name} onClick={()=>setJourProtIdx(i)}
              style={{flexShrink:0,padding:"8px 14px",borderRadius:14,border:"1px solid",
                borderColor:jourProtIdx===i?"#1a237e":"#e0e0e0",
                background:jourProtIdx===i?"#1a237e":"#fff",
                color:jourProtIdx===i?"#fff":"#555",
                cursor:"pointer",fontSize:13,fontWeight:jourProtIdx===i?700:400}}>
              {p.name}
              {jourSaved[p.name]&&<span style={{marginLeft:4,fontSize:10}}>✓</span>}
            </button>
          ))}
        </div>

        {/* Résultat ventes */}
        {vp&&(
          <div style={{padding:"12px 14px",background:"#e8eaf6",borderRadius:12,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:11,color:"#666",marginBottom:2}}>Portions vendues</div>
              <div style={{fontSize:20,fontWeight:700,color:"#1a237e"}}>{vp.total_portions}</div>
              <div style={{fontSize:11,color:"#888"}}>{vp.portions_sig} sig + {vp.portions_opt} opt</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"#666",marginBottom:2}}>Théorique</div>
              <div style={{fontSize:16,fontWeight:600,color:"#1a237e"}}>{fmtN(vp.theo_net_kg,2)} kg</div>
              <div style={{fontSize:11,color:"#888"}}>{gramTheo}g / portion</div>
            </div>
          </div>
        )}

        {/* Stock début */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#e65100",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Stock début</div>
          {debutLines.map((l,idx)=>(
            <div key={idx} style={{background:"#fff",borderRadius:10,border:`1px solid ${!l.etat?"#dc2626":"#eee"}`,padding:"12px",marginBottom:8}}>
              {!l.etat&&<div style={{fontSize:11,color:"#dc2626",fontWeight:600,marginBottom:6}}>⚠ Sélectionne un état</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {pp.etats.map(e=>(
                  <button key={e.name} onClick={()=>updDebut(idx,"etat",e.name)}
                    style={{padding:"7px 14px",borderRadius:20,border:"1px solid",fontSize:13,
                      borderColor:l.etat===e.name?"#e65100":"#ddd",background:l.etat===e.name?"#e65100":"#fff",
                      color:l.etat===e.name?"#fff":"#555",cursor:"pointer"}}>
                    {e.name}
                  </button>
                ))}
              </div>
              <NumInput value={l.poids_brut} onChange={v=>updDebut(idx,"poids_brut",v)} placeholder="Poids brut (kg)"/>
              <button onClick={()=>delDebut(idx)} style={{width:"100%",marginTop:8,padding:"8px",background:"#ffebee",color:"#c62828",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>Supprimer</button>
            </div>
          ))}
          <button onClick={addDebutLine} style={{width:"100%",padding:"12px",background:"#fff3e0",color:"#e65100",border:"2px dashed #ffcc80",borderRadius:10,fontSize:14,cursor:"pointer",fontWeight:600}}>
            + Ajouter ligne début
          </button>
        </div>

        {/* Stock fin */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1a237e",textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Stock fin de service</div>
          {finLines.map((l,idx)=>(
            <div key={idx} style={{background:"#fff",borderRadius:10,border:`1px solid ${!l.etat?"#dc2626":"#eee"}`,padding:"12px",marginBottom:8}}>
              {!l.etat&&<div style={{fontSize:11,color:"#dc2626",fontWeight:600,marginBottom:6}}>⚠ Sélectionne un état</div>}
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                {pp.etats.map(e=>(
                  <button key={e.name} onClick={()=>updFin(idx,"etat",e.name)}
                    style={{padding:"7px 14px",borderRadius:20,border:"1px solid",fontSize:13,
                      borderColor:l.etat===e.name?"#1a237e":"#ddd",background:l.etat===e.name?"#1a237e":"#fff",
                      color:l.etat===e.name?"#fff":"#555",cursor:"pointer"}}>
                    {e.name}
                  </button>
                ))}
              </div>
              <NumInput value={l.poids_brut} onChange={v=>updFin(idx,"poids_brut",v)} placeholder="Poids brut (kg)"/>
              <button onClick={()=>delFin(idx)} style={{width:"100%",marginTop:8,padding:"8px",background:"#ffebee",color:"#c62828",border:"none",borderRadius:8,fontSize:13,cursor:"pointer"}}>Supprimer</button>
            </div>
          ))}
          <button onClick={addFinLine} style={{width:"100%",padding:"12px",background:"#e8eaf6",color:"#1a237e",border:"2px dashed #9fa8da",borderRadius:10,fontSize:14,cursor:"pointer",fontWeight:600}}>
            + Ajouter ligne fin
          </button>
        </div>

        {/* Résultat écart */}
        {debutLines.length>0&&finLines.length>0&&vp&&(
          <div style={{padding:"14px 16px",borderRadius:12,background:ecartCol.bg,border:`1px solid ${ecartCol.text}33`,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#666"}}>Conso réelle</span>
              <span style={{fontWeight:700,color:"#333"}}>{fmtN(conso,3)} kg net</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{fontSize:12,color:"#666"}}>Grammage réel</span>
              <span style={{fontWeight:700,color:ecartCol.text,fontSize:16}}>{gramReel}g / portion</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:12,color:"#666"}}>Écart vs théorique ({gramTheo}g)</span>
              <span style={{fontWeight:700,color:ecartCol.text}}>{ecart!==null?(ecart>=0?"+":"")+ecart+"g":"—"}</span>
            </div>
          </div>
        )}

        {/* Bouton valider */}
        {isSaved
          ?<div style={{padding:"12px 16px",background:"#e8f5e9",borderRadius:12,border:"1px solid #a5d6a7",textAlign:"center",fontSize:14,fontWeight:700,color:"#2e7d32"}}>
            ✓ Inventaire journalier validé
          </div>
          :<button onClick={saveJour}
            style={{width:"100%",padding:"16px",background:"#1a237e",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(26,35,126,.3)"}}>
            ✓ Valider l'inventaire journalier
          </button>
        }
      </div>
    );
  };

  // ── LOADING ───────────────────────────────────────────────────────────────
  if (!isLoaded) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}>
      <div style={{width:32,height:32,border:"3px solid #e0e0e0",borderTop:"3px solid #1a237e",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:12,color:"#888"}}>Chargement…</div>
    </div>
  );

  // ── RENDER ────────────────────────────────────────────────────────────────
  return (
    <div style={{fontFamily:"system-ui,sans-serif",color:"#111",minHeight:"100vh",background:"#f5f5f3"}}>
      {/* CSS global */}
      <style>{`
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number] { -moz-appearance:textfield; appearance:textfield; }
        @keyframes spin { to { transform:rotate(360deg); } }
        button:active { opacity: 0.85; }
      `}</style>

      {/* Header */}
      <div style={{background:"#1a237e",padding:"14px 16px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>
        <div>
          <div style={{fontSize:9,fontWeight:700,letterSpacing:".12em",color:"rgba(255,255,255,0.5)",textTransform:"uppercase",marginBottom:1}}>
            ILIA
          </div>
          <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>Inventaire</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {saved
            ? <span style={{fontSize:12,color:"#a5d6a7",fontWeight:600}}>✓ Sauvegardé</span>
            : <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Auto-save</span>
          }
        </div>
      </div>

      {/* Navigation principale */}
      <div style={{display:"flex",gap:3,padding:"8px 12px 0",background:"#1a237e"}}>
        {[["semaine","Inv. semaine"],["journalier","Journalier"],["transfert","Transferts"]].map(([v,l])=>(
          <button key={v} onClick={()=>setMainTab(v)}
            style={{flex:1,padding:"8px 2px",fontSize:11,fontWeight:mainTab===v?700:400,
              background:mainTab===v?"#fff":"rgba(255,255,255,0.15)",
              color:mainTab===v?"#1a237e":"rgba(255,255,255,0.8)",
              border:"none",borderRadius:"8px 8px 0 0",cursor:"pointer",whiteSpace:"nowrap"}}>
            {l}
          </button>
        ))}
      </div>

      {/* Contenu */}
      <div style={{padding:"16px 12px 40px"}}>
        {mainTab === "semaine"    && renderInventaire()}
        {mainTab === "journalier" && renderJournalier()}
        {mainTab === "transfert"  && renderTransferts()}
      </div>

      <div style={{textAlign:"center",fontSize:10,color:"#ccc",paddingBottom:16}}>
        ILIA Groupe © 2026
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
